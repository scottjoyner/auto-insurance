# Product Approval Matrix

# Tracks approval status of each product through the product lifecycle.

lifecycle_statuses:
  - draft
  - architecture_sample_only
  - internal_review
  - compliance_review
  - approved_for_testing
  - approved_for_production
  - suspended
  - retired

current_products:
  - product_id: sample_personal_auto_v1
    status: architecture_sample_only
    jurisdiction: SAMPLE
    owner: architecture_team
    last_reviewed: null
    notes: Architecture prototype only

approval_workflow:
  - step: 1
    action: Submit for architecture_sample_only review
    reviewer: architecture_team
  - step: 2
    action: Architecture review (schema, rating, coverage)
    reviewer: architecture_team
  - step: 3
    action: Compliance review
    reviewer: compliance_team
  - step: 4
    action: Legal/regulatory review
    reviewer: legal_team
  - step: 5
    action: Testing validation
    reviewer: testing_team
  - step: 6
    action: Executive review
    reviewer: executive_team

review_cadence:
  architecture_sample_only: no_scheduled_review
  internal_review: weekly
  compliance_review: biweekly
  approved_for_testing: monthly
  approved_for_production: quarterly
  suspended: on_demand
  retired: none
