version: "0.1.0"
status: draft
owner: treasury_governance_committee
last_reviewed: null

purpose: >
  Treasury policy for the architecture phase. All crypto assets are prohibited.
  All treasury actions are simulation-only for MVP.

mode: simulation_only

premium_allocation:
  unearned_premium_reserve_pct: 0.0
  loss_reserve_pct: 0.0
  loss_adjustment_expense_reserve_pct: 0.0
  operating_capital_pct: 0.0
  restricted_capital_pct: 0.0
  investable_surplus_pct: 0.0
  note: >
    Percentages are placeholders. Real allocation requires actuarial review,
    regulatory compliance, and treasury committee approval.

allowed_assets:
  - cash_usd
  - us_treasury_bills

prohibited_assets:
  - crypto
  - stablecoins
  - commodities
  - equities
  - derivatives
  - private_equity
  - real_estate

minimum_liquidity_usd: 0
max_duration_days: 0
max_counterparty_exposure_pct: 0
max_stablecoin_exposure_pct: 0

treasury_actions:
  allowed:
    - premium_allocation
    - reserve_snapshot
    - liquidity_report
  prohibited:
    - treasury_transfer
    - investment_purchase
    - investment_sale
    - treasury_proposal
    - smart_contract_treasury_action

approval_requirements:
  premium_allocation:
    requires_approval: false
    note: "Automated allocation for MVP (stubbed)"
  reserve_snapshot:
    requires_approval: true
    approval_role: TREASURY_APPROVER
  treasury_transfer:
    requires_approval: true
    approval_role: TREASURY_SIGNER_MULTISIG
  investment_purchase:
    requires_approval: true
    approval_role: TREASURY_APPROVER
  smart_contract_treasury_action:
    requires_approval: true
    approval_role: SMART_CONTRACT_SIGNER
