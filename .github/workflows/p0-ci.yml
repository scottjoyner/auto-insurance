name: Phase 1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phase1-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pytest>=8.3" "fastapi>=0.115" "httpx>=0.28" "pydantic>=2.10" "pydantic-settings>=2.7" "pyyaml>=6.0" "sqlalchemy>=2.0" "PyJWT>=2.10" "cryptography>=42.0" "alembic>=1.13"

      - name: Validate documentation metadata
        run: |
          python scripts/validate_docs.py
          python - <<'PY'
          from pathlib import Path
          docs = [
              'docs/00_documentation_index.md',
              'docs/07_employee_operating_manual.md',
              'docs/08_claims_crm_operating_guide.md',
              'docs/09_blockchain_security_review.md',
              'docs/10_markdown_cleanup_register.md',
          ]
          fields = ['Owner:', 'Audience:', 'Last reviewed:', 'Status:']
          failures = []
          for rel in docs:
              path = Path(rel)
              if not path.exists():
                  failures.append(f'{rel} not found')
                  continue
              head = path.read_text(encoding='utf-8', errors='ignore')[:1000]
              for field in fields:
                  if field not in head:
                      failures.append(f'{rel} missing {field}')
          if failures:
              print('\n'.join(failures))
              raise SystemExit(1)
          print('Required documentation metadata validated.')
          PY

      - name: Validate Alembic revision syntax
        run: |
          python -m py_compile services/quote-service/alembic/versions/0001_phase1_quote_baseline.py
          python -m py_compile services/risk-appetite-service/alembic/versions/0001_phase1_risk_baseline.py
          python -m py_compile services/policy-service/alembic/versions/0001_phase1_policy_baseline.py
          python -m py_compile services/customer-service/alembic/versions/0001_phase1_customer_baseline.py

      - name: Validate quote migration
        run: python scripts/apply_sql_migrations.py --database /tmp/quote_phase1.db --migrations services/quote-service/migrations

      - name: Validate risk migration
        run: python scripts/apply_sql_migrations.py --database /tmp/risk_phase1.db --migrations services/risk-appetite-service/migrations

      - name: Validate policy migration
        run: python scripts/apply_sql_migrations.py --database /tmp/policy_phase1.db --migrations services/policy-service/migrations

      - name: Validate claims migration
        run: python scripts/apply_sql_migrations.py --database /tmp/claims_phase1.db --migrations services/claims-service/migrations

      - name: Validate customer migration
        run: python scripts/apply_sql_migrations.py --database /tmp/customer_phase1.db --migrations services/customer-service/migrations

      - name: Run rating DSL golden tests
        env:
          PYTHONPATH: packages/rating-dsl
        run: pytest packages/rating-dsl/tests

      - name: Run shared security tests
        env:
          PYTHONPATH: packages/security
        run: pytest packages/security/tests

      - name: Run orchestration tests
        env:
          PYTHONPATH: packages/orchestration
        run: pytest packages/orchestration/tests

      - name: Run events tests
        env:
          PYTHONPATH: packages/events
        run: pytest packages/events/tests

      - name: Run documents tests
        env:
          PYTHONPATH: packages/documents
        run: pytest packages/documents/tests

      - name: Run observability tests
        env:
          PYTHONPATH: packages/observability
        run: pytest packages/observability/tests

      - name: Run outbox script tests
        env:
          PYTHONPATH: .:packages/events
        run: pytest scripts/tests

      - name: Run quote repository tests
        env:
          PYTHONPATH: services/quote-service:packages/rating-dsl:packages/security:packages/observability
          QUOTE_SERVICE_DATABASE_URL: sqlite://
        run: pytest services/quote-service/tests/test_quote_repository.py

      - name: Run quote API tests
        env:
          PYTHONPATH: services/quote-service:packages/rating-dsl:packages/security:packages/observability
          QUOTE_SERVICE_DATABASE_URL: sqlite://
        run: pytest services/quote-service/tests/test_quote_api.py

      - name: Run quote customer validation tests
        env:
          PYTHONPATH: services/quote-service:packages/rating-dsl:packages/security:packages/observability
        run: pytest services/quote-service/tests/test_customer_validation.py

      - name: Run risk repository tests
        env:
          PYTHONPATH: services/risk-appetite-service:packages/security:packages/observability
          RISK_APPETITE_DATABASE_URL: sqlite://
        run: pytest services/risk-appetite-service/tests/test_risk_repository.py

      - name: Run policy repository tests
        env:
          PYTHONPATH: services/policy-service:packages/security:packages/observability
          POLICY_SERVICE_DATABASE_URL: sqlite://
        run: pytest services/policy-service/tests/test_policy_repository.py

      - name: Run policy API tests
        env:
          PYTHONPATH: services/policy-service:packages/security:packages/observability
          POLICY_SERVICE_DATABASE_URL: sqlite://
        run: pytest services/policy-service/tests/test_policy_api.py

      - name: Run policy customer validation tests
        env:
          PYTHONPATH: services/policy-service:packages/security:packages/observability
        run: pytest services/policy-service/tests/test_customer_validation.py

      - name: Run claims repository tests
        env:
          PYTHONPATH: services/claims-service:packages/security:packages/observability:packages/documents
          CLAIMS_SERVICE_DATABASE_URL: sqlite://
        run: pytest services/claims-service/tests/test_claims_repository.py

      - name: Run claims API tests
        env:
          PYTHONPATH: services/claims-service:packages/security:packages/observability:packages/documents
          CLAIMS_SERVICE_DATABASE_URL: sqlite://
        run: pytest services/claims-service/tests/test_claims_api.py

      - name: Run claims customer validation tests
        env:
          PYTHONPATH: services/claims-service:packages/security:packages/observability:packages/documents
        run: pytest services/claims-service/tests/test_customer_validation.py

      - name: Run customer API tests
        env:
          PYTHONPATH: services/customer-service:packages/security:packages/observability
          CUSTOMER_SERVICE_DATABASE_URL: sqlite://
        run: pytest services/customer-service/tests/test_customer_api.py

      - name: Run e2e ownership workflow
        env:
          PYTHONPATH: services/customer-service:services/quote-service:services/policy-service:services/claims-service:packages/rating-dsl:packages/security:packages/observability:packages/documents
          QUOTE_SERVICE_DATABASE_URL: sqlite://
          POLICY_SERVICE_DATABASE_URL: sqlite://
          CLAIMS_SERVICE_DATABASE_URL: sqlite://
          CUSTOMER_SERVICE_DATABASE_URL: sqlite://
        run: pytest tests/e2e/test_customer_ownership_workflow.py

      - name: Compose config validation
        run: docker compose config
