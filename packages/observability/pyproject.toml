[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "insurance-observability"
version = "0.1.0"
description = "Shared observability and redaction helpers"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
]

[tool.hatch.build.targets.wheel]
packages = ["insurance_observability"]
